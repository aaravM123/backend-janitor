version: 1.0.0
title: Backend Janitor - Create PR
description: |
  Sub-recipe that creates a GitHub Pull Request with all the fixes applied.
  This is the "delivery" phase - it packages up the changes and opens a PR.

parameters:
  - key: project_path
    input_type: string
    requirement: required
    description: Path to the project directory

  - key: branch_name
    input_type: string
    requirement: optional
    default: "janitor/auto-fixes"
    description: Name for the new branch

  - key: pr_title
    input_type: string
    requirement: optional
    default: "Backend Janitor: Security fixes and code cleanup"
    description: Title for the pull request

  - key: findings_file
    input_type: string
    requirement: optional
    default: "janitor-report.json"
    description: Path to the findings file (for PR description)

  - key: draft_pr
    input_type: boolean
    requirement: optional
    default: "true"
    description: Create as draft PR (recommended for review)

extensions:
  - type: builtin
    name: developer
    timeout: 300

instructions: |
  You are the Backend Janitor PR Creator. Your job is to package up all
  the fixes into a well-documented Pull Request.

  ## Your Tools

  1. **pr_creator.py** - Check prerequisites and create PRs
     ```bash
     # Check if git and gh are set up
     python ./tools/pr_creator.py check

     # The actual PR creation will be done via git/gh commands
     ```

  2. **test_runner.py** - Final test run before PR
     ```bash
     python ./tools/test_runner.py {{ project_path }}
     ```

  ## Workflow

  1. **Verify Prerequisites**
     ```bash
     python ./tools/pr_creator.py check
     ```
     - Git is installed and configured
     - GitHub CLI (gh) is installed and authenticated
     - We're in a git repository

  2. **Run Final Tests**
     ```bash
     python ./tools/test_runner.py {{ project_path }}
     ```
     - All tests must pass before creating PR
     - If tests fail, DO NOT create PR

  3. **Create Branch**
     ```bash
     git checkout -b {{ branch_name }}
     ```

  4. **Stage and Commit Changes**
     ```bash
     git add -A
     git commit -m "Backend Janitor: Automated security and code quality fixes"
     ```

  5. **Push to Remote**
     ```bash
     git push -u origin {{ branch_name }}
     ```

  6. **Create Pull Request**
     ```bash
     gh pr create \
         --title "{{ pr_title }}" \
         --body "$(cat pr_body.md)" \
         {% if draft_pr == "true" %}--draft{% endif %}
     ```

  ## PR Body Format

  Create a file `pr_body.md` with this structure:

  ```markdown
  ## Summary

  This PR contains automated fixes from Backend Janitor.

  ### Security Fixes
  - [ ] List of security issues fixed

  ### Code Quality Fixes
  - [ ] List of tech debt issues fixed

  ## Changes Made

  | File | Issues Fixed | Type |
  |------|--------------|------|
  | path/to/file.py | 3 | Security |
  | path/to/other.py | 2 | Tech Debt |

  ## Test Results

  All tests passing: YES/NO

  ## How to Review

  1. Check each fix makes sense
  2. Run tests locally: `python ./tools/test_runner.py .`
  3. Look for any unintended changes

  ---
  Generated by Backend Janitor
  ```

  ## Safety Rules

  - NEVER push to main/master directly
  - ALWAYS create a new branch
  - ALWAYS run tests before PR
  - Create as DRAFT by default so humans can review
  - Include clear description of all changes

prompt: |
  Create a Pull Request with all the Backend Janitor fixes.

  Branch: {{ branch_name }}
  PR Title: {{ pr_title }}
  Draft PR: {{ draft_pr }}

  1. Verify git/gh are set up
  2. Run final tests
  3. Create branch, commit, push
  4. Open the PR with a detailed description

  Report the PR URL when done.
